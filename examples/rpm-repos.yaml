# RPM repository snippets for mirrors.yaml
# Copy the entries you need into the rpm_repos section of your mirrors.yaml.
# All examples are for x86_64. Adjust the path/base_url for other arches (e.g. aarch64).
# Add 'enable: false' under any repo to skip it temporarily during testing.

rpm_repos:

  # ---------------------------------------------------------------------------
  # CentOS Stream 9
  # ---------------------------------------------------------------------------
  - name: centos-9stream-baseos
    enable: true
    path: centos/9-stream/BaseOS/x86_64/os
    base_url: https://mirror.stream.centos.org/9-stream/BaseOS/x86_64/os/
    gpg_key: https://www.centos.org/keys/RPM-GPG-KEY-CentOS-Official

  - name: centos-9stream-appstream
    enable: true
    path: centos/9-stream/AppStream/x86_64/os
    base_url: https://mirror.stream.centos.org/9-stream/AppStream/x86_64/os/
    gpg_key: https://www.centos.org/keys/RPM-GPG-KEY-CentOS-Official

  - name: centos-9stream-crb
