name: Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build release binary
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o repomirror .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: repomirror
          generate_release_notes: true
